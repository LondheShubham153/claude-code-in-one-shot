server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml
    application/xml+rss;

  # Hashed/long-lived static assets
  location ~* \.(?:css|js|woff2?|ttf|otf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # HTML — never cached, so updates show up immediately
  location / {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri $uri/ $uri.html /index.html;
  }

  server_tokens off;
}
