services:
  web:
    build:
      context: .
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    image: portfolio-web:latest
    expose:
      - "80"
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    depends_on:
      - web
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:?NGROK_AUTHTOKEN is required — copy .env.example to .env and fill it in}
    command:
      - "http"
      - "--log=stdout"
      - "web:80"
    ports:
      - "4040:4040" # ngrok inspector dashboard
