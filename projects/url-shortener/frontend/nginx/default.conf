server {
  listen 80;
  listen [::]:80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain
    text/css
    application/javascript
    application/json
    image/svg+xml;

  server_tokens off;

  # API → backend
  location /api/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Explicit /s/{slug} redirects → backend
  location /s/ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Health endpoints → backend (operational, not user-facing)
  location ~ ^/(healthz|readyz)$ {
    proxy_pass http://backend:8000;
    proxy_http_version 1.1;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Hashed/long-lived static assets
  location ~* \.(?:css|js|woff2?|svg|ico|png|jpg|jpeg|gif|webp|avif)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Bare-slug shortcut: rewrite /<slug> to /s/<slug> if it matches the slug pattern
  # AND the requested path doesn't exist as a static file. Keep the regex in sync
  # with backend/app/schemas.py SLUG_REGEX.
  location ~ "^/([A-Za-z0-9_-]{4,32})$" {
    if (-f $request_filename) {
      break;
    }
    rewrite ^/(.+)$ /s/$1 last;
  }

  # SPA fallback — index.html for everything else
  location / {
    add_header Cache-Control "no-cache, must-revalidate";
    try_files $uri $uri/ /index.html;
  }
}
